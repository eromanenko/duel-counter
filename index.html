<!doctype html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#090a0f">
  <title>Duel Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen">
      <div class="setup-card">
        <h1>DUEL COUNTER</h1>
        <p>Set Starting Life</p>

        <div class="input-group">
          <div class="hp-presets">
            <button class="preset-btn" data-val="20">20</button>
            <button class="preset-btn" data-val="40">40</button>
            <button class="preset-btn active" data-val="50">50</button>
          </div>
          <input type="number" id="custom-hp" class="custom-hp" value="50" min="1" max="999">
        </div>

        <button id="edit-names-btn" class="start-btn"
          style="background: rgba(255,255,255,0.1); box-shadow: none; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2);">CHANGE
          NAMES</button>
        <button id="resume-btn" class="start-btn hidden"
          style="margin-bottom: 15px; background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%);">RESUME
          DUEL</button>
        <button id="start-btn" class="start-btn">BEGIN DUEL</button>
        <button id="install-btn" class="start-btn hidden" style="margin-top: 15px; background: #2a2d36;">INSTALL
          APP</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <!-- Player 2 (Top) -->
      <div class="player-panel" data-player="2" id="panel-p2">
        <div class="panel-bg"></div>
        <div class="score-container">
          <div class="player-name" id="name-2">Player 2</div>
          <div class="score-value" id="score-2">50</div>
        </div>
        <div class="controls-overlay">
          <div class="tap-zone minus" data-player="2" data-dir="-1"></div>
          <div class="tap-zone plus" data-player="2" data-dir="1"></div>
        </div>
        <div class="mini-btn-container">
          <button class="mini-btn" data-player="2" data-val="-5">-5</button>
          <button class="mini-btn" data-player="2" data-val="5">+5</button>
        </div>
      </div>

      <!-- Settings Middle Button -->
      <div id="settings-btn" class="settings-btn">
        <svg viewBox="0 0 24 24">
          <path
            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
        </svg>
      </div>

      <!-- Player 1 (Bottom) -->
      <div class="player-panel" data-player="1" id="panel-p1">
        <div class="panel-bg"></div>
        <div class="score-container">
          <div class="player-name" id="name-1">Player 1</div>
          <div class="score-value" id="score-1">50</div>
        </div>
        <div class="controls-overlay">
          <div class="tap-zone minus" data-player="1" data-dir="-1"></div>
          <div class="tap-zone plus" data-player="1" data-dir="1"></div>
        </div>
        <div class="mini-btn-container">
          <button class="mini-btn" data-player="1" data-val="-5">-5</button>
          <button class="mini-btn" data-player="1" data-val="5">+5</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
